<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' http: https: data: blob:; media-src 'self' http: https: data: blob:; connect-src 'self' http: https:;">
  <title>My IPTV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="logo">
        <img src="assets/my-iptv-logo.png" alt="" />
        <h1>My IPTV</h1>
      </div>
      <div id="controls">
        <input type="text" id="search" data-i18n-placeholder="searchPlaceholder" placeholder="筛选频道..." />
        <div id="filter-bar">
          <button id="sort-name" class="sort-btn active" data-i18n="sortName">名称</button>
          <button id="toggle-fav" class="sort-btn"><span class="fav-mark">☆</span> <span data-i18n="favorites">收藏</span></button>
          <select id="group-filter">
            <option value="" data-i18n="allGroups">全部分组</option>
          </select>
        </div>
      </div>
      <div id="channel-list"></div>
      <div id="status-bar">
        <span id="channel-count">0 channels</span>
        <div id="status-actions">
          <button id="about-btn" data-i18n-title="aboutTitle" title="关于 My IPTV">i</button>
          <button id="settings-btn" data-i18n-title="settingsTitle" title="设置">⚙</button>
          <button id="refresh-btn" data-i18n-title="refreshTitle" title="更新频道">↻</button>
        </div>
      </div>
    </aside>
    <main id="player-area">
      <div id="video-container">
        <video id="video-player" controls autoplay></video>
        <div id="no-channel">
          <span data-i18n="selectChannel">选择频道开始观看</span>
        </div>
        <div id="player-toolbar">
          <button id="btn-screenshot" data-i18n-title="screenshotTitle" title="截图保存 PNG"><span data-i18n="screenshot">截图</span></button>
          <button id="btn-record" data-i18n-title="recordTitle" title="录制视频"><span data-i18n="record">录制</span></button>
        </div>
      </div>
      <div id="now-playing">
        <span id="channel-name" data-i18n="noChannel">未选择频道</span>
        <div id="channel-info"></div>
      </div>
    </main>
  </div>

  <div id="settings-overlay" class="overlay hidden">
    <div id="settings-panel">
      <div id="settings-header">
        <span data-i18n="settingsHeader">设置</span>
        <button id="settings-close" class="close-btn">×</button>
      </div>
      <div id="settings-body">
        <label class="setting-row">
          <span data-i18n="themeLabel">主题</span>
          <select id="s-theme">
            <option value="dark" data-i18n="themeDark">深色</option>
            <option value="light" data-i18n="themeLight">浅色</option>
          </select>
        </label>
        <label class="setting-row">
          <span data-i18n="languageLabel">语言</span>
          <select id="s-language">
            <option value="zh" data-i18n="languageZh">中文</option>
            <option value="en" data-i18n="languageEn">English</option>
          </select>
        </label>
        <label class="setting-row">
          <span data-i18n="maxBufferLength">最大缓冲时长 (秒)</span>
          <input type="number" id="s-maxBufferLength" min="10" max="300" />
        </label>
        <label class="setting-row">
          <span data-i18n="maxBufferSize">最大缓冲大小 (MB)</span>
          <input type="number" id="s-maxBufferSize" min="10" max="1000" />
        </label>
        <label class="setting-row">
          <span data-i18n="startLevel">初始码率层级</span>
          <input type="number" id="s-startLevel" min="-1" max="20" />
        </label>
        <label class="setting-row">
          <span data-i18n="fragRetry">分片加载重试</span>
          <input type="number" id="s-fragLoadingMaxRetry" min="0" max="20" />
        </label>
        <label class="setting-row">
          <span data-i18n="fragTimeout">分片超时 (毫秒)</span>
          <input type="number" id="s-fragLoadingTimeOut" min="1000" max="60000" step="1000" />
        </label>
        <label class="setting-row">
          <span data-i18n="levelTimeout">码率层超时 (毫秒)</span>
          <input type="number" id="s-levelLoadingTimeOut" min="1000" max="60000" step="1000" />
        </label>
        <label class="setting-row">
          <span data-i18n="manifestTimeout">播放列表超时 (毫秒)</span>
          <input type="number" id="s-manifestLoadingTimeOut" min="1000" max="60000" step="1000" />
        </label>
        <label class="setting-row checkbox-row">
          <span data-i18n="enableWorker">启用 Web Worker</span>
          <input type="checkbox" id="s-enableWorker" />
        </label>
        <label class="setting-row checkbox-row">
          <span data-i18n="capPlayerSize">限制到播放器尺寸</span>
          <input type="checkbox" id="s-capLevelToPlayerSize" />
        </label>
        <label class="setting-row checkbox-row">
          <span data-i18n="preloadNext">预加载下一分片</span>
          <input type="checkbox" id="s-startFragPrefetch" />
        </label>
        <label class="setting-row checkbox-row">
          <span data-i18n="debugLog">开启播放 Debug 日志</span>
          <input type="checkbox" id="s-debugLog" />
        </label>
      </div>
      <div id="settings-footer">
        <button id="settings-reset" class="btn-secondary" data-i18n="resetDefaults">恢复默认</button>
        <button id="settings-apply" class="btn-primary" data-i18n="applyClose">应用并关闭</button>
      </div>
    </div>
  </div>

  <div id="about-overlay" class="overlay hidden">
    <div id="about-panel">
      <div id="about-header">
        <span data-i18n="aboutHeader">关于 My IPTV</span>
        <button id="about-close" class="close-btn">×</button>
      </div>
      <div id="about-body">
        <img id="about-logo" src="assets/my-iptv-logo.png" alt="" />
        <div id="about-title">My IPTV</div>
        <dl id="about-details">
          <div>
            <dt data-i18n="version">版本</dt>
            <dd>1.0.0</dd>
          </div>
          <div>
            <dt data-i18n="application">应用名称</dt>
            <dd>My IPTV</dd>
          </div>
          <div>
            <dt data-i18n="author">作者</dt>
            <dd><a href="mailto:zengkai001@gmail.com">zengkai001@gmail.com</a></dd>
          </div>
          <div>
            <dt data-i18n="project">项目</dt>
            <dd><a href="https://github.com/kzeng/my-iptv" target="_blank" rel="noreferrer">https://github.com/kzeng/my-iptv</a></dd>
          </div>
        </dl>
      </div>
    </div>
  </div>

  <script src="lib/hls.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
